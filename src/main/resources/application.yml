spring:
  application:
    name: clinio
  profiles:
    active: dev
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  thymeleaf:
    cache: false
  servlet:
    session:
      timeout: 30m

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

clinio:
  default-timezone: America/Chicago
