services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clinio
      POSTGRES_USER: clinio
      POSTGRES_PASSWORD: clinio
    ports:
      - "5432:5432"
    volumes:
      - clinio_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinio -d clinio"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  clinio_pgdata:
